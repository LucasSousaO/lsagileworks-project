function mountLang(lang){
  if(!BODIES[lang]) lang='en';
  document.getElementById('app').innerHTML = BODIES[lang];
  document.documentElement.lang = lang;
  localStorage.setItem('ls-lang', lang);
  wireLangButtons();
  wireForm();
  document.querySelectorAll('[aria-pressed]').forEach(b=>{
    const t=(b.textContent||'').trim().toLowerCase();
    b.setAttribute('aria-pressed', t===lang ? 'true':'false');
  });
}
function wireLangButtons(){
  document.querySelectorAll('button').forEach(b=>{
    const t=(b.textContent||'').trim().toLowerCase();
    if(['en','pt','es'].includes(t)){
      b.onclick=()=>mountLang(t);
    }
  });
}
function wireForm(){
  const f=document.querySelector('form');
  if(!f) return;
  const get=(id)=>{const el=f.querySelector('#'+id); return el? el.value.trim():'';};
  f.onsubmit=(e)=>{
    e.preventDefault();
    const body=encodeURIComponent(`Name: ${get('name')}\nCompany: ${get('company')}\nEmail: ${get('email')}\n\n${get('message')}`);
    window.location.href=`mailto:contact@lsagileworks.com?subject=Consultation%20Request&body=${body}`;
  };
  const submitBtn=f.querySelector('button[type="submit"]')||f.querySelector('button');
  if(submitBtn && !f.querySelector('[data-wa-btn]')){
    const wrap=submitBtn.parentElement;
    if(wrap){ wrap.classList.add('flex','flex-wrap','items-center','gap-3'); }

    wa.className=submitBtn.className.replace(/bg-primary|text-primary-foreground|hover:bg-primary\/90/g,'').trim()+' bg-[#25D366] text-green hover:bg-[#1ebe5d] border border-[#25D366]';

    wa.onclick=()=>{
      const text=`${get('message')} - ${get('name')}/${get('company')}`;
      window.open('https://wa.me/5531988276388?text='+encodeURIComponent(text),'_blank','noopener,noreferrer');
    };
    submitBtn.insertAdjacentElement('afterend', wa);
  }
}
